<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안티그라비티 오리 경주</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        :root {
            --primary-color: #ffb703;
            --secondary-color: #219ebc;
            --accent-color: #fb8500;
            --dark-bg: #023047;
            --light-text: #8ecae6;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: blur(5px) brightness(0.6);
            transition: filter 0.5s;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Screen States */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.3s ease;
        }

        .screen.active {
            display: flex;
            z-index: 10;
        }

        /* Setup Screen */
        h1 {
            font-size: 3rem;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--light-text);
        }

        textarea,
        select,
        button {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1rem;
        }

        textarea {
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            resize: vertical;
        }

        select {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            cursor: pointer;
        }

        button {
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            color: white;
            font-weight: 900;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
            font-size: 1.2rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 133, 0, 0.4);
        }

        /* Race Screen */
        #commentary-box {
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: bold;
            border-bottom: 1px solid var(--glass-border);
            position: absolute;
            top: 0;
            z-index: 20;
        }

        #track-area {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            /* Prevent scrolling strictly */
            margin-top: 60px;
            /* space for commentary */
            background: rgba(255, 255, 255, 0.05);
        }

        .lane {
            position: relative;
            width: 100%;
            /* height set dynamically in JS */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
        }

        .lane:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .runner-container {
            position: absolute;
            left: 0;
            /* 0% to ~90% */
            height: 100%;
            width: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: left 0.1s linear;
        }

        .runner-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.5));
        }

        .runner-name {
            font-size: 0.7rem;
            color: white;
            white-space: nowrap;
            text-shadow: 1px 1px 2px black;
        }

        .finish-line {
            position: absolute;
            right: 5%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: repeating-linear-gradient(45deg,
                    white,
                    white 10px,
                    black 10px,
                    black 20px);
            z-index: 5;
        }

        /* Countdown Overlay */
        #countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 10rem;
            font-weight: 900;
            color: var(--primary-color);
            z-index: 100;
            text-shadow: 0 0 20px var(--accent-color);
        }

        @keyframes rankGlow {
            0% {
                box-shadow: 0 0 5px #ffd700, 0 0 10px #ffd700;
                transform: scale(1);
                border: 2px solid #ffd700;
            }

            50% {
                box-shadow: 0 0 20px #ffd700, 0 0 30px #ff8c00;
                transform: scale(1.02);
                border: 2px solid #ffffe0;
            }

            100% {
                box-shadow: 0 0 5px #ffd700, 0 0 10px #ffd700;
                transform: scale(1);
                border: 2px solid #ffd700;
            }
        }

        .rank-1-glow {
            animation: rankGlow 1.5s infinite ease-in-out;
            z-index: 10;
            position: relative;
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.3), rgba(255, 140, 0, 0.3)) !important;
        }

        /* Results Screen */
        .results-content {
            background: rgba(0, 0, 0, 0.5);
            padding: 2rem;
            border-radius: 20px;
            width: 80%;
            max-height: 80%;
            overflow-y: auto;
            text-align: center;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
            text-align: left;
        }

        .leaderboard-table th {
            color: var(--primary-color);
        }

        .rank-1 {
            color: #ffd700;
            font-weight: bold;
        }

        .rank-2 {
            color: #c0c0c0;
            font-weight: bold;
        }

        .rank-3 {
            color: #cd7f32;
            font-weight: bold;
        }

        /* Animation Classes */
        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            80% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes glowing {
            0% {
                filter: drop-shadow(0 0 5px gold) brightness(1.2);
                transform: scale(1.3);
            }

            50% {
                filter: drop-shadow(0 0 20px red) brightness(1.5);
                transform: scale(1.6);
            }

            100% {
                filter: drop-shadow(0 0 5px gold) brightness(1.2);
                transform: scale(1.3);
            }
        }

        .buff-shiny .runner-img {
            animation: glowing 0.3s infinite alternate;
            filter: drop-shadow(0 0 10px gold) brightness(1.5);
            z-index: 50;
        }

        .buff-giant .runner-img {
            transform: scale(2.0) !important;
            /* Force giant size */
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.5));
            z-index: 100 !important;
            /* Topmost */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-duck-img {
            width: 40px;
            height: 40px;
            vertical-align: middle;
            margin-right: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }

        /* Rank-specific sizes */
        .rank-1-row .result-duck-img {
            width: 100px;
            height: 100px;
            border: 3px solid #ffd700;
        }

        .rank-2-row .result-duck-img {
            width: 80px;
            height: 80px;
            border: 3px solid #c0c0c0;
        }

        .rank-3-row .result-duck-img {
            width: 60px;
            height: 60px;
            border: 3px solid #cd7f32;
        }

        .trait-col,
        .record-col {
            display: none;
        }
    </style>
</head>

<body>

    <div id="bg-layer"></div>

    <div class="container">

        <!-- Setup Screen -->
        <div id="setup-screen" class="screen active">
            <h1>오리 경주 게임</h1>

            <div class="input-group">
                <label for="player-names">참가자 이름 (쉼표로 구분)</label>
                <textarea id="player-names" placeholder="예: 김오리, 박오리, 최오리, 이오리...">김오리, 박오리, 최오리, 이오리, 정오리</textarea>
                <button onclick="scrambleNames()"
                    style="background:var(--secondary-color); font-size: 0.9rem; padding: 0.5rem; margin-top: 0.5rem;">참가자
                    순서 섞기</button>
            </div>



            <div class="input-group" style="display:flex; justify-content:space-between; gap:10px;">
                <div style="flex:1;">
                    <label>경기 시간 (초)</label>
                    <select id="race-duration">
                        <option value="10">10초</option>
                        <option value="20" selected>20초</option>
                        <option value="30">30초</option>
                        <option value="40">40초</option>
                        <option value="50">50초</option>
                        <option value="60">60초</option>
                    </select>
                </div>
                <div style="flex:1;">
                    <label>경기 종료 기준 (등수 집계)</label>
                    <select id="target-finish-rank">
                        <option value="1">1위 확정 시 종료</option>
                        <option value="3">3위 확정 시 종료</option>
                        <option value="5">5위 확정 시 종료</option>
                        <option value="10" selected>10위 확정 시 종료</option>
                        <option value="20">20위 확정 시 종료</option>
                        <option value="30">30위 확정 시 종료</option>
                        <option value="1000">전원 골인 시 종료</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>스킬 빈도 (재미 요소)</label>
                <select id="skill-frequency">
                    <option value="1">조용함 (1x)</option>
                    <option value="3">적당함 (3x)</option>
                    <option value="10">시끄러움 (10x)</option>
                    <option value="30" selected>대혼란 (30x)</option>
                </select>
            </div>

            <button onclick="setupGame()">경기 준비</button>
        </div>

        <!-- Race Screen -->
        <div id="race-screen" class="screen">
            <div id="commentary-box">준비 중...</div>
            <div id="track-area">
                <div class="finish-line"></div>
                <!-- Lanes will be generated here -->
            </div>
            <div id="countdown-overlay">3</div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <div class="results-content">
                <h1>경기 결과</h1>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>순위</th>
                            <th>이름</th>
                            <th class="trait-col" style="display:none;">특성</th>
                            <th class="record-col" style="display:none;">기록 (완주 시) / 거리</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Results here -->
                    </tbody>
                </table>
                <button onclick="toggleTraits()" style="background:var(--secondary-color); margin-right: 10px;">상세
                    보기</button>
                <button onclick="resetGame()">리트라이</button>
            </div>
        </div>

    </div>

    <script>
        // --- 1. Audio System ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let bgmOscillators = [];
        let isMuted = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(frequency = 440, duration = 0.1, type = 'sine') {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // BGM synthesis
        function startBGM() {
            if (!audioCtx) return;
            stopBGM();

            const notes = [
                523.25, 0, 659.25, 0, 783.99, 0, 1046.50, 0, // C E G C
                783.99, 0, 659.25, 0, 523.25, 0, 0, 0,
                587.33, 0, 659.25, 0, 587.33, 0, 523.25, 0, // D E D C
                392.00, 0, 0, 0, 0, 0, 0, 0
            ];

            let noteIndex = 0;
            window.bgmInterval = setInterval(() => {
                const freq = notes[noteIndex % notes.length];
                if (freq > 0) {
                    playTone(freq, 0.1, 'triangle', 0.05);
                }
                // Bass line
                if (noteIndex % 8 === 0) playTone(261.63 / 2, 0.3, 'square', 0.03);
                if (noteIndex % 8 === 4) playTone(392.00 / 2, 0.3, 'square', 0.03);

                noteIndex++;
            }, 150);
        }

        function stopBGM() {
            if (window.bgmInterval) {
                clearInterval(window.bgmInterval);
                window.bgmInterval = null;
            }
        }

        function playTone(freq, dur, type, vol) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function playFanfare() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const sequence = [
                { f: 523.25, t: 0.0, d: 0.1 },
                { f: 659.25, t: 0.1, d: 0.1 },
                { f: 783.99, t: 0.2, d: 0.1 },
                { f: 1046.50, t: 0.3, d: 0.6 }
            ];

            sequence.forEach(note => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(note.f, now + note.t);
                gain.gain.setValueAtTime(0.2, now + note.t);
                gain.gain.exponentialRampToValueAtTime(0.01, now + note.t + note.d);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + note.t);
                osc.stop(now + note.t + note.d);
            });
        }

        function playBuffSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            // "Pa-bam!" effect
            playTone(440, 0.1, 'square', 0.1); // A4
            setTimeout(() => playTone(880, 0.2, 'square', 0.15), 100); // A5 (higher, louder)
        }

        function playQuack() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            // Randomized pitch for variety (300Hz ~ 450Hz)
            const baseFreq = 300 + Math.random() * 150;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = 'sawtooth'; // Sawtooth for a bit of "quack" texture
            osc.frequency.setValueAtTime(baseFreq, now);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, now + 0.1); // Quick pitch drop

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, now);
            filter.frequency.exponentialRampToValueAtTime(400, now + 0.15); // Filter sweep

            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(now);
            osc.stop(now + 0.2);
        }

        // --- 2. Game Logic ---
        const DUCK_COUNT = 23; // Set to 23 as per user request
        const TRAITS = ['거북이형', '토끼형', '성장형', '변덕쟁이형'];

        let players = [];
        let raceDuration = 30;
        let raceTime = 0;
        let isRacing = false;
        let globalSlowFactor = 1.0; // Affected by Giant Buff
        let lastBuffTime = -999; // Cooldown timer for buffs
        let timerInterval = null;
        let commentaryInterval = null;
        let animationFrameId = null;

        class Player {
            constructor(name, duckId) {
                this.name = name.trim();
                this.duckId = duckId;
                this.trait = TRAITS[Math.floor(Math.random() * TRAITS.length)];
                this.progress = 0; // 0 to 100 (%)
                this.baseSpeed = 0;
                this.finishTime = null;
                this.finished = false;

                this.speedBuffTime = 0; // Shiny (Self Speed)
                this.giantBuffTime = 0; // Giant (Others Slow)
                this.buffCount = 0;

                this.initTraitStats();
            }

            initTraitStats() {
                this.baseSpeed = 10;
                if (this.trait === '거북이형') this.stability = 0.95;
                else if (this.trait === '토끼형') this.stability = 0.6;
                else if (this.trait === '성장형') this.stability = 0.8;
                else if (this.trait === '변덕쟁이형') this.stability = 0.5;
            }

            update(deltaTime, totalDuration, rank, totalPlayers, baseBuffChance) {
                if (this.finished) return;

                let logicSpeed = this.baseSpeed * deltaTime;
                let luck = Math.random();

                // 1. Buff Duration Management
                if (this.speedBuffTime > 0) {
                    this.speedBuffTime -= deltaTime;
                    logicSpeed *= 1.8; // Shiny Speed Boost (Reduced from 2.5)
                }

                if (this.giantBuffTime > 0) {
                    this.giantBuffTime -= deltaTime;
                    // Giant doesn't speed up self significantly, but slows others (handled in global loop)
                    logicSpeed *= 1.2; // Slight speed up for feeling powerful
                }

                // 2. Buff Trigger Logic
                // Only trigger if no active buff and not finished
                if (this.speedBuffTime <= 0 && this.giantBuffTime <= 0 && !this.finished) {
                    // Rank Multiplier
                    // Top 20% -> 0.2x chance
                    // Bottom 40% -> 2.0x chance
                    let rankPercent = rank / totalPlayers; // 0.0 (1st) to 1.0 (Last)
                    let rankMult = 1.0;

                    if (rankPercent < 0.2) rankMult = 0.2; // Top ranks get less logicSpeed
                    else if (rankPercent > 0.6) rankMult = 2.0; // Bottom ranks get more

                    // Buff Starvation Multiplier (Ducks with 0 buffs get much higher chance)
                    let starvationMult = 1.0;
                    if (this.buffCount === 0) starvationMult = 3.0;
                    else if (this.buffCount === 1) starvationMult = 1.5;
                    else if (this.buffCount >= 3) starvationMult = 0.5;

                    // Final chance per frame
                    let finalChance = baseBuffChance * rankMult * starvationMult;

                    if (Math.random() < finalChance) {
                        this.activateRandomBuff();
                    }
                }

                // 3. Apply Global Slow (from Giant Buffs of others)
                // If I am NOT the giant, I get slowed
                if (this.giantBuffTime <= 0 && globalSlowFactor < 1.0) {
                    logicSpeed *= globalSlowFactor;
                }

                // 4. Trait Logic
                if (this.trait === '거북이형') {
                    // Stable and consistent (Buffed: 1.1x base)
                    if (luck > this.stability) logicSpeed *= 0.8;
                    else logicSpeed *= 1.15;
                }
                else if (this.trait === '토끼형') {
                    // High variance
                    if (luck > this.stability) logicSpeed *= 0.1; // Slow
                    else if (luck < 0.2) logicSpeed *= 2.5; // Boost
                    else logicSpeed *= 1.3; // Normal fast
                }
                else if (this.trait === '성장형') {
                    // Backloader (Nerfed late game 2.0 -> 1.6)
                    const progressRatio = raceTime / totalDuration;
                    if (progressRatio > 0.5) logicSpeed *= 1.6;
                    else logicSpeed *= 0.9; // Slight buff early game to compensate
                }
                else if (this.trait === '변덕쟁이형') {
                    // Chaos (Buffed: avg 0.9 -> avg 1.1)
                    logicSpeed *= (Math.random() * 2.2);
                }

                const calibration = 12 / totalDuration;
                this.progress += logicSpeed * calibration;

                if (this.progress >= 100) {
                    this.progress = 100;
                    this.finished = true;
                    this.finishTime = raceTime;

                    // Remove buffs immediately upon finish
                    this.speedBuffTime = 0;
                    this.giantBuffTime = 0;
                }
            }

            activateRandomBuff() {
                // Global Cooldown check (reduced to 0.5 seconds for more chaos)
                if (raceTime - lastBuffTime < 0.5) return;

                this.buffCount++;

                const isShiny = Math.random() < 0.5;
                const duration = 2.5; // 2.5 seconds duration

                // Update global timer
                lastBuffTime = raceTime;

                if (isShiny) {
                    this.speedBuffTime = duration;
                    showBuffNotification(`${this.name} 오리! ✨빛나는 버프✨ 발동! (속도 증가)`, 'shiny');
                } else {
                    this.giantBuffTime = duration;
                    showBuffNotification(`${this.name} 오리! 🍄커져랏 버프🍄 발동! (전체 감속)`, 'giant');
                }
                playBuffSound();
            }
        }

        // --- 3. UI Control ---
        function showBuffNotification(text, type) {
            const noti = document.createElement('div');
            noti.className = `buff-notification ${type}`;
            noti.textContent = text;

            // Notification Style
            Object.assign(noti.style, {
                position: 'absolute',
                top: '80px',
                left: '50%',
                transform: 'translateX(-50%)',
                background: type === 'shiny' ? 'rgba(255, 215, 0, 0.9)' : 'rgba(255, 69, 0, 0.9)',
                color: 'white',
                padding: '10px 20px',
                borderRadius: '20px',
                fontWeight: 'bold',
                fontSize: '1.2rem',
                zIndex: '1000',
                boxShadow: '0 4px 15px rgba(0,0,0,0.5)',
                opacity: '0',
                transition: 'opacity 0.3s, transform 0.3s'
            });

            document.getElementById('race-screen').appendChild(noti);

            // Animate In
            requestAnimationFrame(() => {
                noti.style.opacity = '1';
                noti.style.transform = 'translateX(-50%) translateY(10px)';
            });

            // Remove after 2s
            setTimeout(() => {
                noti.style.opacity = '0';
                setTimeout(() => noti.remove(), 300);
            }, 2000);
        }
        const setupScreen = document.getElementById('setup-screen');
        const raceScreen = document.getElementById('race-screen');
        const resultScreen = document.getElementById('result-screen');
        const trackArea = document.getElementById('track-area');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const commentaryBox = document.getElementById('commentary-box');

        function switchScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if (screenName === 'setup') setupScreen.classList.add('active');
            if (screenName === 'race') raceScreen.classList.add('active');
            if (screenName === 'result') resultScreen.classList.add('active');
        }

        function setupGame() {
            initAudio();

            const namesText = document.getElementById('player-names').value;
            const nameList = namesText.split(',').filter(n => n.trim() !== '');

            if (nameList.length === 0) {
                alert('참가자를 최소 1명 입력해주세요.');
                return;
            }

            // Shuffle duck IDs based on fixed count 23
            let duckIds = Array.from({ length: DUCK_COUNT }, (_, i) => i + 1);
            for (let i = duckIds.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [duckIds[i], duckIds[j]] = [duckIds[j], duckIds[i]];
            }

            players = nameList.map((name, idx) => {
                // Reuse shuffled list if more players than ducks
                const duckId = duckIds[idx % DUCK_COUNT];
                return new Player(name, duckId);
            });

            raceDuration = parseInt(document.getElementById('race-duration').value);

            targetFinishRank = parseInt(document.getElementById('target-finish-rank').value);

            switchScreen('race');

            // Calculate dynamic lane height to fit screen - ensure NO SCROLLING
            // Use getBoundingClientRect for precise float pixel values
            const trackRect = trackArea.getBoundingClientRect();
            // Subtract a tiny safety margin (2px) to prevent sub-pixel rendering overflow
            const trackHeight = trackRect.height - 2;
            // Force fit all players into the available height using float division
            let laneHeight = trackHeight / players.length;

            // Adjust lane height constraints
            // We remove the upper cap if it causes overflow, but keep a minimum for visibility if possible
            // Actually, to guarantee no scroll, we must respect the division exactly.

            // Calculate dynamic scale for elements based on this potentially small laneHeight
            let scaleFactor = 1.0;

            // User requested larger size even if overlapping
            // We set a generous minimum scale
            if (laneHeight < 30) {
                scaleFactor = 1.0; // Force distinct size even in small lanes (will overlap)
            } else if (laneHeight < 60) {
                scaleFactor = 1.2;
            } else {
                scaleFactor = Math.min(laneHeight / 50, 2.5);
            }

            const imgSize = Math.floor(40 * scaleFactor);
            const nameSize = Math.max(0.6, Math.min(1.5, (0.7 * scaleFactor)));

            console.log(`Players: ${players.length}, TrackH: ${trackHeight}, LaneH: ${laneHeight}, Scale: ${scaleFactor}`);

            // Generate Track
            trackArea.innerHTML = '<div class="finish-line"></div>';
            players.forEach((p, idx) => {
                const lane = document.createElement('div');
                lane.className = 'lane';
                lane.style.height = `${laneHeight}px`; // Uses float pixels
                // Allow visual overlap if squeezed
                if (laneHeight < 40) lane.style.zIndex = idx;

                lane.innerHTML = `
                    <div class="runner-container" id="runner-${idx}" style="left: 0%;">
                        <img src="duck${p.duckId}.png" class="runner-img" alt="${p.name}" 
                             style="width:${imgSize}px; height:${imgSize}px;"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="runner-fallback" style="display:none; width:${imgSize}px; height:${imgSize}px; background:var(--primary-color); border-radius:50%; align-items:center; justify-content:center; font-weight:bold; color:black; font-size:${10 * scaleFactor}px;">${p.duckId}</div>
                        <div class="runner-name" style="font-size:${nameSize}rem;">${p.name}</div>
                    </div>
                `;
                trackArea.appendChild(lane);
            });

            startCountdown();
        }

        function startCountdown() {
            let count = 3;
            countdownOverlay.style.display = 'flex';
            countdownOverlay.textContent = count;
            playBeep(600, 0.2);

            let timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownOverlay.textContent = count;
                    playBeep(600, 0.2);
                } else if (count === 0) {
                    countdownOverlay.textContent = 'GO!';
                    playBeep(800, 0.5, 'square');
                } else {
                    clearInterval(timer);
                    countdownOverlay.style.display = 'none';
                    startRace();
                }
            }, 1000);
        }

        function startRace() {
            isRacing = true;
            raceTime = 0;
            globalSlowFactor = 1.0;
            isRacing = true;
            raceTime = 0;
            globalSlowFactor = 1.0;
            lastBuffTime = -999; // Reset buff cooldown
            let lastTime = performance.now();
            let raceEnded = false; // Flag to prevent multiple end calls

            // Calculate Base Buff Chance
            const freqMultiplier = parseInt(document.getElementById('skill-frequency').value);
            // Target: (Players / 2.5) * Multiplier * 10 (User requested 10x more buff chance from current)
            const targetBuffCount = Math.ceil((players.length / 2.5) * freqMultiplier * 10);
            // Chance per frame per player = TotalBuffs / (Duration * 60) / Players
            const totalFrames = raceDuration * 60;
            const baseBuffChance = targetBuffCount / totalFrames / players.length;

            console.log(`Target Buffs: ${targetBuffCount}, Base Chance: ${baseBuffChance.toFixed(6)}`);

            function gameLoop(currentTime) {
                if (!isRacing) return;

                const deltaTime = (currentTime - lastTime) / 1000;
                lastTime = currentTime;
                raceTime += deltaTime;

                let activePlayers = 0;

                // 1. Determine Global Slow Factor
                // If any player has giant buff active, factor is 0.7 (Mild slow, reduced from 0.4)
                const giantActive = players.some(p => p.giantBuffTime > 0);
                globalSlowFactor = giantActive ? 0.7 : 1.0;

                // 2. Update Players
                const rankedPlayers = [...players].sort((a, b) => b.progress - a.progress);

                players.forEach((p, idx) => {
                    if (!p.finished) {
                        const currentRank = rankedPlayers.indexOf(p);
                        p.update(deltaTime, raceDuration, currentRank, players.length, baseBuffChance);
                        activePlayers++;
                    }

                    // Visual Update
                    const runnerEl = document.getElementById(`runner-${idx}`);
                    const visualPos = Math.min(p.progress, 100) * 0.95;
                    runnerEl.style.left = `${visualPos}%`;

                    // Remove old classes
                    runnerEl.classList.remove('buff-shiny', 'buff-giant');

                    // Apply new classes
                    if (p.speedBuffTime > 0) runnerEl.classList.add('buff-shiny');
                    if (p.giantBuffTime > 0) runnerEl.classList.add('buff-giant');
                });

                // Check Finish Condition
                const finishedCount = players.filter(p => p.finished).length;

                // End if active players are 0 OR target rank reached
                if (!raceEnded) {
                    if (activePlayers === 0 || finishedCount >= targetFinishRank) {
                        raceEnded = true;
                        // Wait 3 seconds before showing results
                        setTimeout(() => {
                            endRace();
                        }, 3000);
                    }
                }

                if (activePlayers === 0 && !raceEnded) {
                    // Safety net if everyone finished precisely
                    endRace();
                    return;
                }

                // 3. Random Quack Sound (Cute ambience)
                // Approx 2% chance per frame (at 60fps ~ 1.2 quacks/sec on average)
                if (Math.random() < 0.02) {
                    playQuack();
                }

                if (!isRacing && raceEnded) return; // Stop loop if race fully ended handling elsewhere

                animationFrameId = requestAnimationFrame(gameLoop);
            }

            animationFrameId = requestAnimationFrame(gameLoop);

            // Commentary Loop
            commentaryInterval = setInterval(updateCommentary, 2500);
            updateCommentary();

            startBGM();
        }

        function updateCommentary() {
            if (!isRacing) return;

            // Get leaders (unfinished first, then farthest)
            const activeRunners = players.filter(p => !p.finished);
            if (activeRunners.length === 0) return;

            activeRunners.sort((a, b) => b.progress - a.progress);
            const top = activeRunners[0];

            // Generate comment
            const comments = [
                `${top.name} 선수가 선두를 유지합니다!`,
                `치열한 순위 싸움!`,
                `${top.name} 선수, 가장 먼저 치고 나갑니다!`,
                `모두 전력을 다하고 있습니다!`,
            ];

            // Trait based comments
            if (top.trait === '토끼형') comments.push(`${top.name} 선수, 토끼처럼 빠릅니다!`);
            if (top.trait === '변덕쟁이형') comments.push(`${top.name} 선수, 예측 불가능한 움직임!`);

            // Random chance for back rank mention
            if (activeRunners.length > 2 && Math.random() > 0.7) {
                const last = activeRunners[activeRunners.length - 1];
                comments.push(`${last.name} 선수, 힘을 내야 합니다!`);
            }

            const randomComment = comments[Math.floor(Math.random() * comments.length)];
            commentaryBox.textContent = randomComment;

            // Animation reset
            commentaryBox.style.animation = 'none';
            commentaryBox.offsetHeight;
            commentaryBox.style.animation = 'popIn 0.5s ease-out';
        }

        function endRace() {
            isRacing = false;
            cancelAnimationFrame(animationFrameId);
            clearInterval(commentaryInterval);
            stopBGM();

            commentaryBox.textContent = "경기 종료! 결과 집계 중...";

            setTimeout(() => {
                try {
                    showResults();
                    playFanfare();
                } catch (e) {
                    console.error("Error showing results:", e);
                    alert("결과 표시 중 오류가 발생했습니다.");
                    switchScreen('result'); // Force switch
                }
            }, 2000);
        }

        function showResults() {
            try {
                switchScreen('result');
                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';

                // Sort logic: Finished time ascending, then progress descending
                const sortedPlayers = [...players].sort((a, b) => {
                    if (a.finished && b.finished) return a.finishTime - b.finishTime;
                    if (a.finished) return -1;
                    if (b.finished) return 1;
                    return b.progress - a.progress;
                });

                // Determine how many to show
                // If finishRank is >= 1000 (finish all), show everyone.
                // Otherwise show up to that rank or all if count < rank
                const limitCount = targetFinishRank >= 1000 ? sortedPlayers.length : targetFinishRank;

                sortedPlayers.slice(0, limitCount).forEach((p, idx) => {
                    const tr = document.createElement('tr');
                    let rankClass = '';
                    let rowClass = '';

                    if (idx === 0) {
                        rankClass = 'rank-1';
                        rowClass = 'rank-1-row rank-1-glow'; // Added glow
                    }
                    else if (idx === 1) { rankClass = 'rank-2'; rowClass = 'rank-2-row'; }
                    else if (idx === 2) { rankClass = 'rank-3'; rowClass = 'rank-3-row'; }

                    tr.className = rowClass;

                    const record = p.finished
                        ? p.finishTime.toFixed(2) + '초'
                        : Math.floor(p.progress) + 'm (리타이어)';

                    tr.innerHTML = `
                    <td class="${rankClass}">${idx + 1}위</td>
                    <td class="${rankClass}" style="display:flex; align-items:center;">
                        <img src="duck${p.duckId}.png" class="result-duck-img" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxIDEiPjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9ImdyYXkiLz48L3N2Zz4='">
                        ${p.name}
                    </td>
                    <td class="trait-col" style="display:none;">${p.trait}</td>
                    <td class="record-col" style="display:none; color: #aaa;">${record}</td>
                `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("showResults error:", e);
            }
        }

        function toggleTraits() {
            const traits = document.querySelectorAll('.trait-col');
            const records = document.querySelectorAll('.record-col');
            const isHidden = traits[0] && traits[0].style.display === 'none';

            traits.forEach(c => c.style.display = isHidden ? 'table-cell' : 'none');
            records.forEach(c => c.style.display = isHidden ? 'table-cell' : 'none');
        }

        function scrambleNames() {
            const textarea = document.getElementById('player-names');
            const names = textarea.value.split(',').map(n => n.trim()).filter(n => n !== '');
            if (names.length < 2) return;

            // Fisher-Yates Shuffle
            for (let i = names.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [names[i], names[j]] = [names[j], names[i]];
            }

            textarea.value = names.join(', ');
        }

        function resetGame() {
            switchScreen('setup');

            // Force hide columns properly
            const headers = document.querySelectorAll('th.trait-col, th.record-col');
            headers.forEach(h => h.style.display = 'none');

            // Note: Body rows are cleared on restart anyway, so just header reset is enough for "state"
            // But verify we select them correctly if they exist
            const traitCols = document.querySelectorAll('.trait-col');
            const recordCols = document.querySelectorAll('.record-col');
            traitCols.forEach(c => c.style.display = 'none');
            recordCols.forEach(c => c.style.display = 'none');

            // Reset Scroll
            const content = document.querySelector('.results-content');
            if (content) {
                content.scrollTop = 0;
            }
        }

    </script>
</body>
